<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Worker Report - Sync GSheet</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="time.png">
  
  <!-- Library untuk Konversi HTML ke PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#64748b;
      --line:#111111;
      --accent:#0f172a;
      --accent-2:#1d4ed8;
      --font: Arial, Helvetica, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
    
    /* Layout Utama: Sidebar Kiri & Kertas Kanan */
    .app { display: flex; height: 100%; width: 100%; }
    
    /* Sidebar Kiri */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--card);
      border-right: 1px solid #e2e8f0;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 4px 0 15px rgba(0,0,0,0.03);
    }

    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-logo { display: flex; align-items: center; gap: 12px; }
    .header-logo img { height: 42px; width: auto; border-radius: 8px; object-fit: contain; }
    .title { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: .2px; color: #0f172a; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 11px; line-height: 1.5; }
    
    /* Tombol Pengaturan Meta */
    .btn-settings {
      background: transparent; border: none; font-size: 20px; cursor: pointer; padding: 4px;
      border-radius: 8px; transition: background 0.2s; color: var(--muted);
    }
    .btn-settings:hover { background: #f1f5f9; color: #0f172a; }
    
    .settings-panel {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px;
      display: flex; flex-direction: column; gap: 10px; margin-top: -8px;
    }

    .control-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 11px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: .05em; }
    input[type="text"], input[type="search"], select {
      width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px;
      font: inherit; font-size: 13px; background: #fff; color: var(--text); outline: none; transition: border 0.2s;
    }
    input:focus, select:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(29,78,216,.15); }
    select:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
    
    .btn-col { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
    button {
      appearance: none; border: 0; border-radius: 10px; padding: 12px 16px; font: inherit; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: all .15s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-dark { background: var(--accent); color: #fff; box-shadow: 0 4px 10px rgba(15,23,42,.15); }
    .btn-blue { background: var(--accent-2); color: #fff; box-shadow: 0 4px 10px rgba(29,78,216,.15); }
    .btn-light { background: #f8fafc; color: #0f172a; border: 1px solid #cbd5e1; }
    
    /* Area Kanan (Preview Kertas) */
    .main-stage {
      flex: 1;
      background: linear-gradient(180deg, #e9edf4 0%, #eef2f7 100%);
      overflow-y: auto;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    
    .paper {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      color: #111;
      box-shadow: 0 24px 60px rgba(15,23,42,.15);
      padding: 22mm 15mm 18mm;
      position: relative;
    }

    /* Isi Laporan */
    .report { width: 100%; font-family: Arial, Helvetica, sans-serif; color: #111; }
    .report-company { text-align: center; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .report-title { text-align: center; font-size: 20px; font-weight: 800; margin: 0 0 10px; }
    .report-period { text-align: center; font-size: 12px; font-weight: 700; margin: 0 0 4px; }
    .report-range { text-align: center; font-size: 9px; font-weight: 700; margin: 0 0 12px; }
    .report-meta-row { display: flex; justify-content: space-between; align-items: flex-end; font-size: 11px; margin-bottom: 14px; }
    
    .report-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 11px; }
    .report-table thead th { text-align: left; font-size: 10px; padding: 3px 3px 4px; font-weight: 800; border-top: 2px solid var(--line); border-bottom: 2px solid var(--line); vertical-align: bottom; }
    .report-table tbody td { padding: 2px 3px; vertical-align: middle; border-bottom: none; white-space: nowrap; overflow: hidden; height: 23px; }
    
    .report-table .col-code { width: 11%; }
    .report-table .col-name { width: 13%; }
    .report-table .col-dept { width: 14%; }
    .report-table .col-date { width: 10%; }
    .report-table .col-in { width: 8.5%; text-align: center; }
    .report-table .col-out { width: 9%; text-align: center; }
    .report-table .col-ot { width: 8.5%; text-align: center; }
    .report-table .col-remarks { width: 18%; }
    
    /* Style Edit Langsung (Input Tembus Pandang) */
    .report-table input {
      width: 100%; border: 1px solid transparent; background: transparent; border-radius: 4px;
      font-family: inherit; font-size: inherit; color: inherit; padding: 2px 4px; margin: -2px -4px;
      text-align: inherit; outline: none; transition: background 0.2s, border 0.2s;
    }
    .report-table input:hover, .report-table input:focus {
      background: #f1f5f9; border-color: #cbd5e1; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }
    
    .report-footer-box { margin-top: 4px; border-top: 2px solid var(--line); border-bottom: 2px solid var(--line); padding: 5px 0; font-size: 11px; display: flex; gap: 12px; align-items: center; }
    .report-version { position: absolute; left: 15mm; bottom: 11mm; font-size: 9px; color: #111; }
    
    .hidden { display: none !important; }

    /* Toast Notification */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1e293b; color: #fff; padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000; pointer-events: none; white-space: nowrap; opacity: 0;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: #b91c1c; }
    .toast.success { background: #15803d; }
    .toast.warn { background: #ca8a04; color: #fff; }

    /* Responsif Layar Kecil */
    @media (max-width: 900px) {
      .app { flex-direction: column; overflow-y: auto; }
      .sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; height: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 16px; }
      .main-stage { padding: 16px; overflow-y: visible; }
      .paper { transform-origin: top center; width: 210mm; }
    }
    
    /* Aturan Print */
    @page { size: A4 portrait; margin: 10mm; }
    @media print {
      body { background: #fff; padding: 0; display: block; overflow: visible; height: auto; }
      .sidebar { display: none !important; }
      .main-stage { padding: 0; background: none; overflow: visible; display: block; }
      .paper { box-shadow: none; width: auto; min-height: auto; margin: 0; padding: 0; }
      .report-version { position: fixed; left: 15mm; bottom: 8mm; }
      .report-table input { border: none !important; background: transparent !important; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- SIDEBAR KIRI -->
    <aside class="sidebar">
      <div class="header-top">
        <div class="header-logo">
          <img src="hoplun128.png" alt="Logo" onerror="this.style.display='none'">
          <div>
            <h1 class="title">Absensi</h1>
            <p class="subtitle">Auto Sync & Edit Cepat</p>
          </div>
        </div>
        <button id="btnSettings" class="btn-settings" title="Pengaturan Laporan">⚙️</button>
      </div>

      <!-- PANEL PENGATURAN META (Tersembunyi by default) -->
      <div id="settingsPanel" class="settings-panel hidden">
        <div class="control-group">
          <label>Kode Report</label>
          <input id="systemCodeInput" type="text" value="HRIDIN01" />
        </div>
        <div class="control-group">
          <label>Versi Footer</label>
          <input id="versionInput" type="text" value="1.25.02.28" />
        </div>
      </div>

      <div class="control-group">
        <label>Pilih Sheet (Periode Otomatis)</label>
        <select id="sheetSelect" disabled>
          <option value="">Memuat daftar sheet...</option>
        </select>
      </div>
      
      <div class="control-group">
        <label>Cari No ID / Nama</label>
        <input id="searchInput" type="search" placeholder="Ketik lalu pilih di bawah..." />
      </div>
      
      <div class="control-group">
        <label>Hasil Pencarian</label>
        <select id="employeeSelect">
          <option value="">Tunggu Sinkronisasi...</option>
        </select>
      </div>

      <div class="btn-col" style="margin-top:auto;">
        <button id="btnSync" class="btn-light">🔄 Refresh Sheet</button>
        <button id="btnResetCurrent" class="btn-light" style="color:#9a3412; border-color:#fdba74; background:#fff7ed;">↺ Batal Edit</button>
        <button id="btnPrint" class="btn-dark" title="Cetak ke Printer lalu Otomatis Download PDF">🖨️ Print & Download PDF</button>
      </div>
    </aside>

    <!-- AREA KANAN (PREVIEW KERTAS) -->
    <main class="main-stage">
      <div class="paper" id="paperTarget">
        <div id="reportRoot" class="report"></div>
        <div id="reportVersion" class="report-version">Version: 1.25.02.28</div>
      </div>
    </main>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast">Notifikasi</div>

  <script>
    // URL Web App
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbydwcka1DrUbJKXgTBrfBo6UuE1E4feRkZu_mB2K5O9Wu0wtxI_L2REBzNZFqL6QcHV/exec";

    const appState = {
      sheetNames: [],
      sourceRows: [],
      workingRows: [],
      selectedCode: '',
      selectedSheet: ''
    };

    const aliases = {
      code: ['Employee Code','employee code','employee_code','code', 'id', 'nik', 'employee_id', 'id karyawan', 'employee no', 'pin', 'emp code', 'emp. code'],
      name: ['Employee Name','employee name','employee_name','name', 'nama', 'nama karyawan', 'employee', 'emp name', 'emp. name'],
      department: ['Department','department', 'dept', 'departemen', 'bagian'],
      clockDate: ['Clock Date','clock date','clock_date','date', 'tanggal', 'tanggal_absen', 'date record'],
      clockIn: ['Clock In','clock in','clock_in', 'in', 'jam_masuk', 'masuk', 'time in'],
      clockOut: ['Clock Out','clock out','clock_out', 'out', 'jam_keluar', 'keluar', 'time out'],
      overtime: ['OT Authorized','Overtime','OT','ot authorized','overtime','ot', 'lembur', 'jam lembur'],
      remarks: ['Remarks Description','Remarks','remarks description','remarks', 'keterangan', 'desc', 'keterangan/remarks'],
      uniqueKey: ['Unique Key','unique key','uniqueKey', 'key']
    };

    const el = {
      sheetSelect: document.getElementById('sheetSelect'),
      searchInput: document.getElementById('searchInput'),
      employeeSelect: document.getElementById('employeeSelect'),
      systemCodeInput: document.getElementById('systemCodeInput'),
      versionInput: document.getElementById('versionInput'),
      btnSync: document.getElementById('btnSync'),
      btnPrint: document.getElementById('btnPrint'),
      btnResetCurrent: document.getElementById('btnResetCurrent'),
      btnSettings: document.getElementById('btnSettings'),
      settingsPanel: document.getElementById('settingsPanel'),
      reportRoot: document.getElementById('reportRoot'),
      reportVersion: document.getElementById('reportVersion'),
      paperTarget: document.getElementById('paperTarget')
    };

    // Toast Logic
    let toastTimeout;
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 4000);
    }

    function escapeHtml(value){
      return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function pad(num){ return String(num).padStart(2, '0'); }

    function parseToDate(value){
      if (!value && value !== 0) return null;
      if (value instanceof Date && !Number.isNaN(value.getTime())) return new Date(value.getFullYear(), value.getMonth(), value.getDate());
      if (typeof value === 'string') {
        const clean = value.trim();
        if (!clean) return null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(clean)) { const [y,m,d] = clean.split('-').map(Number); return new Date(y, m - 1, d); }
        if (/^\d{2}-\d{2}-\d{4}$/.test(clean)) { const [d,m,y] = clean.split('-').map(Number); return new Date(y, m - 1, d); }
        const parsed = new Date(clean);
        if (!Number.isNaN(parsed.getTime())) return new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate());
      }
      if (typeof value === 'number') {
        const base = new Date(Math.round((value - 25569) * 86400 * 1000));
        if (!Number.isNaN(base.getTime())) return new Date(base.getUTCFullYear(), base.getUTCMonth(), base.getUTCDate());
      }
      return null;
    }

    function formatDateISO(dateObj){
      if (!(dateObj instanceof Date) || Number.isNaN(dateObj.getTime())) return '';
      return `${dateObj.getFullYear()}-${pad(dateObj.getMonth()+1)}-${pad(dateObj.getDate())}`;
    }

    function formatDateDDMMYYYY(value){
      const d = parseToDate(value);
      if (!d) return '';
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
    }

    function formatGeneratedDate(date = new Date()){
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return `${pad(date.getDate())}-${pad(date.getMonth()+1)}-${date.getFullYear()} (${days[date.getDay()]})`;
    }

    function formatTimeValue(value){
      if (value === null || value === undefined) return '';
      if (typeof value === 'string') {
        const clean = value.trim();
        if (!clean || clean.toLowerCase() === 'nan') return '';
        if (/^\d{1,2}:\d{2}(\+)?$/.test(clean)) {
          const plus = clean.endsWith('+') ? '+' : '';
          const [h, m] = clean.replace('+','').split(':').map(Number);
          return `${pad(h)}:${pad(m)}${plus}`;
        }
        return clean;
      }
      if (typeof value === 'number') {
        const totalMinutes = Math.round(value * 24 * 60);
        const h = Math.floor(totalMinutes / 60) % 24;
        const m = totalMinutes % 60;
        return `${pad(h)}:${pad(m)}`;
      }
      return String(value);
    }

    function buildUniqueKey(row){
      return [row.code || row.name || '', row.clockDate || '', row.clockIn || '', row.clockOut || '', row.overtime || '', row.remarks || ''].join('|');
    }

    function normalizeRow(raw){
      const row = {
        code: pickValue(raw, aliases.code),
        name: pickValue(raw, aliases.name),
        department: pickValue(raw, aliases.department),
        clockDate: formatDateISO(parseToDate(pickValue(raw, aliases.clockDate))),
        clockIn: formatTimeValue(pickValue(raw, aliases.clockIn)),
        clockOut: formatTimeValue(pickValue(raw, aliases.clockOut)),
        overtime: String(pickValue(raw, aliases.overtime) || '0.0').trim() || '0.0',
        remarks: String(pickValue(raw, aliases.remarks) || '').trim(),
        uniqueKey: String(pickValue(raw, aliases.uniqueKey) || '').trim(),
        periodLabel: appState.selectedSheet
      };
      if (!row.uniqueKey) row.uniqueKey = buildUniqueKey(row);
      return row;
    }

    function pickValue(obj, keys){
      if (!obj || typeof obj !== 'object') return '';
      const entries = Object.keys(obj);
      for (const wanted of keys) {
        const found = entries.find(key => String(key).trim() === wanted);
        if (found !== undefined) return obj[found];
      }
      const lowerMap = entries.reduce((acc, key) => { acc[String(key).trim().toLowerCase()] = obj[key]; return acc; }, {});
      for (const wanted of keys) {
        const val = lowerMap[String(wanted).trim().toLowerCase()];
        if (val !== undefined) return val;
      }
      return '';
    }

    function dedupeRows(rows){
      const map = new Map();
      rows.forEach(raw => {
        const row = normalizeRow(raw);
        if (!row.code && !row.name) return; 
        if (!map.has(row.uniqueKey)) map.set(row.uniqueKey, row);
      });
      return Array.from(map.values()).sort((a,b) => {
        if (a.code !== b.code) return a.code.localeCompare(b.code);
        if (a.clockDate !== b.clockDate) return a.clockDate.localeCompare(b.clockDate);
        return a.clockIn.localeCompare(b.clockIn);
      });
    }

    function parseApiPayload(payload){
      if (!payload) return [];
      if (Array.isArray(payload)) {
        if (payload.length > 0 && Array.isArray(payload[0])) {
          const headers = payload[0].map(String);
          return payload.slice(1).map(row => {
            const obj = {};
            headers.forEach((head, idx) => obj[head] = row[idx]);
            return obj;
          });
        }
        return payload; 
      }
      if (Array.isArray(payload.rows)) return parseApiPayload(payload.rows);
      if (Array.isArray(payload.data)) return parseApiPayload(payload.data);
      if (Array.isArray(payload.records)) return parseApiPayload(payload.records);
      if (payload.headers && Array.isArray(payload.values)) {
        return payload.values.map(row => {
          const obj = {};
          payload.headers.forEach((head, idx) => obj[head] = row[idx]);
          return obj;
        });
      }
      if (Array.isArray(payload.values) && payload.values.length > 0) {
        const first = payload.values[0];
        if (Array.isArray(first)) {
          const headers = first.map(String);
          return payload.values.slice(1).map(row => {
            const obj = {};
            headers.forEach((head, idx) => obj[head] = row[idx]);
            return obj;
          });
        } else if (typeof first === 'object') {
           return payload.values;
        }
      }
      return [];
    }

    async function fetchJson(url){
      const res = await fetch(url, { method:'GET' });
      const text = await res.text();
      if (text.trim().startsWith('<') || text.toLowerCase().includes('<!doctype html>')) {
        throw new Error('Script error: Mengembalikan format HTML.');
      }
      let data = null;
      try { data = JSON.parse(text); } catch(error) { throw new Error('Data bukan format JSON.'); }
      if (data && data.ok === false && data.message) throw new Error(data.message);
      if (data && data.error) throw new Error(data.error);
      return data;
    }

    function jsonp(url){
      return new Promise((resolve, reject) => {
        const callbackName = '__gsheetSync_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const timer = setTimeout(() => { cleanup(); reject(new Error('Timeout koneksi.')); }, 15000);
        function cleanup(){ clearTimeout(timer); if (script.parentNode) script.parentNode.removeChild(script); try { delete window[callbackName]; } catch (_e) { window[callbackName] = undefined; } }
        window[callbackName] = (data) => {
          cleanup();
          if (data && data.ok === false && data.message) reject(new Error(data.message));
          else if (data && data.error) reject(new Error(data.error));
          else resolve(data);
        };
        script.onerror = () => { cleanup(); reject(new Error('Gagal koneksi JSONP.')); };
        const joiner = url.includes('?') ? '&' : '?';
        script.src = url + joiner + 'callback=' + callbackName;
        document.body.appendChild(script);
      });
    }

    async function loadAppAndSheets() {
      showToast('Memuat nama Sheet dari server...', 'info');
      el.sheetSelect.disabled = true;

      const url = `${WEB_APP_URL}?action=getSheets`;
      let sheetsFound = [];

      try {
        let payload = null;
        try { payload = await fetchJson(url); } catch (e) { payload = await jsonp(url); }
        if (payload && payload.sheets && Array.isArray(payload.sheets)) {
          sheetsFound = payload.sheets;
        }
      } catch (error) { console.warn('Gagal load sheet:', error); }

      if (sheetsFound.length > 0) {
        appState.sheetNames = sheetsFound;
        el.sheetSelect.innerHTML = sheetsFound.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
        el.sheetSelect.disabled = false;
        
        el.sheetSelect.value = sheetsFound[0];
        appState.selectedSheet = sheetsFound[0];
        syncFromGSheet();
      } else {
        showToast('Gagal memuat nama Sheet. Cek koneksi.', 'error');
      }
    }

    async function syncFromGSheet(){
      const sheetName = el.sheetSelect.value.trim();
      if(!sheetName) return;

      appState.selectedSheet = sheetName;
      const queries = [
        `${WEB_APP_URL}?action=read&sheetName=${encodeURIComponent(sheetName)}`,
        `${WEB_APP_URL}?mode=read&sheetName=${encodeURIComponent(sheetName)}`,
        `${WEB_APP_URL}?sheetName=${encodeURIComponent(sheetName)}`,
        `${WEB_APP_URL}`
      ];

      showToast(`Mengambil data: ${sheetName}...`, 'info');
      el.btnSync.disabled = true;
      el.sheetSelect.disabled = true;

      try {
        let rows = [];
        let firstErrorMsg = '';
        let successFetch = false;

        for (const url of queries) {
          try {
            const payload = await fetchJson(url);
            successFetch = true;
            rows = parseApiPayload(payload);
            break; 
          } catch (error) { if (!firstErrorMsg) firstErrorMsg = error.message; }
        }

        if (!successFetch && !firstErrorMsg.includes('Execute as') && !firstErrorMsg.includes('Login')) {
          for (const url of queries) {
            try {
              const payload = await jsonp(url);
              successFetch = true;
              rows = parseApiPayload(payload);
              break;
            } catch (error) { if (!firstErrorMsg) firstErrorMsg = error.message; }
          }
        }

        if (!successFetch) throw new Error(firstErrorMsg || 'Gagal menghubungi server Apps Script.');

        const normalized = dedupeRows(rows);
        appState.sourceRows = JSON.parse(JSON.stringify(normalized));
        appState.workingRows = JSON.parse(JSON.stringify(normalized));
        
        applySearch(true);

        if (normalized.length === 0) {
          showToast(`Sheet "${sheetName}" kosong.`, 'warn');
        } else {
          showToast(`Sinkron selesai! ${normalized.length.toLocaleString('id-ID')} baris diambil.`, 'success');
        }

      } catch (error) {
        showToast(`Sinkron gagal: ${error.message}`, 'error');
      } finally {
        el.btnSync.disabled = false;
        el.sheetSelect.disabled = false;
      }
    }

    function getEmployeeMatches(term){
      const employees = [...new Map(appState.workingRows.map(row => [row.code, row])).values()];
      const clean = String(term || '').trim().toLowerCase();
      if (!clean) return employees.sort((a,b) => a.code.localeCompare(b.code));
      
      return employees.filter(emp =>
        String(emp.code).toLowerCase().includes(clean) ||
        String(emp.name).toLowerCase().includes(clean)
      ).sort((a,b) => a.code.localeCompare(b.code));
    }

    function fillEmployeeSelect(matches){
      const current = appState.selectedCode;
      if (matches.length === 0) {
         el.employeeSelect.innerHTML = '<option value="">Tidak ada hasil</option>';
         appState.selectedCode = '';
         return;
      }

      el.employeeSelect.innerHTML = '<option value="">Pilih Karyawan...</option>' +
        matches.map(emp => `<option value="${escapeHtml(emp.code)}">${escapeHtml(emp.code)} - ${escapeHtml(emp.name)}</option>`).join('');
      
      if (matches.some(m => m.code === current)) {
        el.employeeSelect.value = current;
      } else if (el.searchInput.value.trim() !== '') {
        appState.selectedCode = matches[0].code;
        el.employeeSelect.value = matches[0].code;
      } else {
        appState.selectedCode = '';
      }
    }

    function applySearch(autoPreview = false){
      const matches = getEmployeeMatches(el.searchInput.value);
      fillEmployeeSelect(matches);
      renderReport();
    }

    function getSelectedRows(){
      if (!appState.selectedCode) return [];
      return appState.workingRows
               .filter(r => r.code === appState.selectedCode)
               .sort((a,b) => a.clockDate.localeCompare(b.clockDate));
    }

    // Tangkap event Edit Langsung dari Kertas
    el.paperTarget.addEventListener('input', (event) => {
      if(event.target.tagName === 'INPUT') {
        const key = event.target.dataset.key;
        const field = event.target.dataset.field;
        const value = event.target.value;
        const row = appState.workingRows.find(item => item.uniqueKey === key);
        if (row) {
          row[field] = field === 'overtime' ? String(value).trim() : value;
        }
      }
    });

    function renderReport(){
      const rows = getSelectedRows();
      const version = el.versionInput.value.trim() || '1.25.02.28';
      const systemCode = el.systemCodeInput.value.trim() || 'HRIDIN01';
      el.reportVersion.textContent = `Version: ${version}`;
      
      if (!rows.length) {
        el.reportRoot.innerHTML = `
          <div class="report-company">Hop Lun</div>
          <div class="report-title">Report Attendance Worker</div>
          <p class="report-period" style="margin-top:40px;color:#94a3b8;">Tidak ada data.</p>
          <p class="report-range" style="color:#94a3b8;">Cari dan pilih ID Karyawan di panel kiri terlebih dahulu.</p>
        `;
        return;
      }

      const first = rows[0];
      const dates = rows.map(r => parseToDate(r.clockDate)).filter(Boolean).sort((a,b) => a - b);
      const start = dates.length ? formatDateDDMMYYYY(dates[0]) : '';
      const end = dates.length ? formatDateDDMMYYYY(dates[dates.length - 1]) : '';
      const generatedDate = formatGeneratedDate(new Date());

      // Render Langsung Input Box di dalam TD untuk Edit Cepat
      const body = rows.map(row => `
        <tr>
          <td class="col-code">${escapeHtml(row.code)}</td>
          <td class="col-name">${escapeHtml(row.name)}</td>
          <td class="col-dept">${escapeHtml(row.department)}</td>
          <td class="col-date">${escapeHtml(formatDateDDMMYYYY(row.clockDate))}</td>
          <td class="col-in"><input type="text" data-field="clockIn" data-key="${escapeHtml(row.uniqueKey)}" value="${escapeHtml(row.clockIn)}" placeholder="-" /></td>
          <td class="col-out"><input type="text" data-field="clockOut" data-key="${escapeHtml(row.uniqueKey)}" value="${escapeHtml(row.clockOut)}" placeholder="-" /></td>
          <td class="col-ot"><input type="text" data-field="overtime" data-key="${escapeHtml(row.uniqueKey)}" value="${escapeHtml(row.overtime)}" placeholder="0.0" /></td>
          <td class="col-remarks"><input type="text" data-field="remarks" data-key="${escapeHtml(row.uniqueKey)}" value="${escapeHtml(row.remarks)}" placeholder="..." /></td>
        </tr>
      `).join('');

      el.reportRoot.innerHTML = `
        <div class="report-company">Hop Lun</div>
        <div class="report-title">Report Attendance Worker</div>
        <div class="report-meta-row">
          <div>${escapeHtml(generatedDate)}</div>
          <div>${escapeHtml(systemCode)} - Page 1 of 1</div>
        </div>
        <p class="report-period">Period: ${escapeHtml(start)} to ${escapeHtml(end)}. All Records</p>
        <p class="report-range">Range: ((Employee Code='${escapeHtml(first.code)}'))</p>
        <table class="report-table">
          <thead>
            <tr>
              <th class="col-code">Employee<br>Code</th>
              <th class="col-name">Employee<br>Name</th>
              <th class="col-dept">Department</th>
              <th class="col-date">Clock Date</th>
              <th class="col-in">Clock In</th>
              <th class="col-out">Clock Out</th>
              <th class="col-ot">Overtime</th>
              <th class="col-remarks">Remarks</th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
        <div class="report-footer-box">
          <strong>Record Count</strong>
          <span>${rows.length}</span>
        </div>
      `;
    }

    function resetCurrent(){
      const currentRows = getSelectedRows();
      if (!currentRows.length) return;
      const keys = new Set(currentRows.map(r => r.uniqueKey));
      appState.workingRows = appState.workingRows.map(row => {
        if (!keys.has(row.uniqueKey)) return row;
        const original = appState.sourceRows.find(src => src.uniqueKey === row.uniqueKey);
        return original ? JSON.parse(JSON.stringify(original)) : row;
      });
      renderReport();
      showToast('Edit dibatalkan. Kembali ke data Sheet.', 'success');
    }

    // Aksi PDF Download Khusus
    function downloadPdf() {
      const rows = getSelectedRows();
      if (!rows.length) return;

      const first = rows[0];
      const filename = `${first.code} - ${first.name}.pdf`;
      
      const oldShadow = el.paperTarget.style.boxShadow;
      el.paperTarget.style.boxShadow = 'none';

      showToast('Menyiapkan file PDF otomatis...', 'info');

      const opt = {
        margin:       [5, 5, 5, 5],
        filename:     filename,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(el.paperTarget).save().then(() => {
        el.paperTarget.style.boxShadow = oldShadow;
        showToast(`PDF Berhasil Terunduh`, 'success');
      }).catch(err => {
        console.error(err);
        el.paperTarget.style.boxShadow = oldShadow;
        showToast('Gagal membuat file PDF.', 'error');
      });
    }

    // Logic Tombol Panel Pengaturan
    el.btnSettings.addEventListener('click', () => {
      el.settingsPanel.classList.toggle('hidden');
    });

    el.btnSync.addEventListener('click', syncFromGSheet);
    
    // Logic gabungan: Print Kertas kemudian langsung Download PDF setelah jendela dialog tertutup
    el.btnPrint.addEventListener('click', () => {
      if(!getSelectedRows().length) {
         showToast("Pilih ID karyawan terlebih dahulu!", "warn");
         return;
      }
      window.print();
      downloadPdf(); 
    });
    
    el.btnResetCurrent.addEventListener('click', resetCurrent);
    
    el.sheetSelect.addEventListener('change', () => {
      appState.selectedCode = '';
      appState.selectedSheet = el.sheetSelect.value;
      syncFromGSheet();
    });

    el.searchInput.addEventListener('input', () => {
      appState.selectedCode = '';
      applySearch(true);
    });

    el.employeeSelect.addEventListener('change', () => {
      appState.selectedCode = el.employeeSelect.value.trim();
      renderReport();
    });

    el.systemCodeInput.addEventListener('input', renderReport);
    el.versionInput.addEventListener('input', renderReport);

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { loadAppAndSheets(); }, 300); 
    });

  </script>
</body>
</html>
